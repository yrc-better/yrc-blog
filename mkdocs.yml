site_name: "synn's space"
site_url: https://blog.yrc-bot.xyz
repo_url: https://github.com/yrc-better/yrc-blog
site_description: "synn's personal blog with notes, projects and life"

theme:
  name: material
  language: en
  custom_dir: overrides
  palette:
    # 暗色为主(硬默认,不跟随系统)
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/moon-waning-crescent
        name: Switch to light mode
    # 亮色(手动切换可用)
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/white-balance-sunny
        name: Switch to dark mode
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search:
      lang: [en, zh]
# - markdown-exec
  - mkdocs-jupyter:
      execute: true
      include_source: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/cyberpunk.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Papers: papers/index.md
  - Projects: projects/index.md
  - Blog:
      - 复旦江湾研0租房经验: posts/复旦江湾研0租房经验.md
      - 人工智能导论学习笔记1: posts/李宏毅人工智能导论学习笔记(一).md
      - 人工智能导论学习笔记2: posts/李宏毅人工智能导论学习笔记(二).md
      - 人工智能导论学习笔记3: posts/李宏毅人工智能导论学习笔记(三).md
      - 人工智能导论学习笔记4: posts/李宏毅人工智能导论学习笔记(四).md
  - Python 示例: python-demo.ipynb
